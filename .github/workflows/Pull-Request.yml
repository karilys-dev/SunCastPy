name: Pull Request

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  actions: read
  checks: write

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      REPORTS_DIR: ${{ github.workspace }}/SunCastPy/reports
      SCRIPTS_DIR: ${{ github.workspace }}/scripts

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          bash ${SCRIPTS_DIR}/github/install-project.sh [tests]

      - name: Run tests + generate reports
        id: pytest
        run: |
          mkdir -p $REPORTS_DIR

          pytest SunCastPy/tests/
        continue-on-error: true

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: ${{ env.REPORTS_DIR }}/

      - name: Publish test summary to PR
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Pytest Results
          path: ${{ env.REPORTS_DIR }}/junit.xml
          reporter: java-junit

      - name: Move coverage to root
        run: |
          cp coverage.xml ${{ env.REPORTS_DIR }}/coverage.xml 
          cat coverage.xml
        working-directory: ${{ github.workspace }}
      - name: Debug paths
        run: |
          pwd
          ls -R
      - name: Coverage comment
        uses: MishaKav/pytest-coverage-comment@v1
        with:
          pytest-coverage-path: coverage.xml

      - name: Comment PR with report link (on failure)
        if: steps.pytest.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const runId = context.runId;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const artifactUrl = `https://github.com/${owner}/${repo}/actions/runs/${runId}`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner,
              repo,
              body: `❌ **Tests failed**
                📄 Download full HTML report:
                👉 ${artifactUrl}
                
                Artifact name: \`test-reports\``
                            });
      - name: Fail job if tests failed
        if: steps.pytest.outcome == 'failure'
        run: exit 1
