name: Pull Request

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  actions: read
  checks: write

jobs:
  test:
    defaults:
      run:
        working-directory: SunCastPy
    runs-on: ubuntu-latest
    env:
      REPORTS_DIR: ${{ github.workspace }}/SunCastPy/reports
      SCRIPTS_DIR: ${{ github.workspace }}/scripts

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          bash ${SCRIPTS_DIR}/github/install-project.sh [tests]

      - name: Run tests + generate reports
        id: pytest
        run: |
          mkdir -p $REPORTS_DIR

          pytest 
          ls -lahR
        continue-on-error: true

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: ${{ env.REPORTS_DIR }}/

      - name: Publish test summary to PR
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Pytest Results
          path: ${{ env.REPORTS_DIR }}/junit.xml
          reporter: java-junit

      # - name: Add coverage to summary
      #   run: |
      #     echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
      #     coverage report >> $GITHUB_STEP_SUMMARY
      - name: Setup Node
        uses: actions/setup-node@v4

      - name: Install script deps
        run: npm install xml2js @actions/core @actions/github

      - name: Publish coverage check
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const xml2js = require('xml2js');

            const xml = fs.readFileSync('reports/coverage.xml', 'utf8');

            xml2js.parseString(xml, async (err, result) => {
              if (err) throw err;

              const packages = result.coverage.packages[0].package;
              let rows = [];

              for (const pkg of packages) {
                const classes = pkg.classes[0].class;

                for (const cls of classes) {
                  const file = cls.$.filename;
                  const lineRate = parseFloat(cls.$['line-rate']);
                  const percent = (lineRate * 100).toFixed(1);

                  rows.push({ file, percent });
                }
              }

              // sort lowest coverage first
              rows.sort((a, b) => a.percent - b.percent);

              let table = `| File | Coverage |
            |------|----------|\n`;

              for (const r of rows) {
                table += `| ${r.file} | ${r.percent}% |\n`;
              }

              await github.rest.checks.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: "Coverage Report",
                head_sha: context.sha,
                status: "completed",
                conclusion: "success",
                output: {
                  title: "Coverage Results",
                  summary: "Per-file coverage",
                  text: table
                }
              });
            });

      - name: Comment PR with report link (on failure)
        if: steps.pytest.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const runId = context.runId;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const artifactUrl = `https://github.com/${owner}/${repo}/actions/runs/${runId}`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner,
              repo,
              body: `❌ **Tests failed**
                📄 Download full HTML report:
                👉 ${artifactUrl}
                
                Artifact name: \`test-reports\``
                            });
      - name: Fail job if tests failed
        if: steps.pytest.outcome == 'failure'
        run: exit 1
