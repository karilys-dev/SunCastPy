name: Pull Request

on:
    pull_request:

permissions:
    contents: read
    pull-requests: write
    actions: read
    checks: write

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Install dependencies
              run: |
                  bash ./scripts/github/install-project.sh [tests]

            - name: Run tests + generate reports
              id: pytest
              run: |
                  mkdir -p reports

                  pytest \
                    --junitxml=reports/junit.xml \
                    --html=reports/pytest-report.html \
                    --self-contained-html \
                    -vv
              continue-on-error: true

            - name: Upload test reports
              uses: actions/upload-artifact@v4
              with:
                  name: test-reports
                  path: reports/

            - name: Publish test summary to PR
              uses: dorny/test-reporter@v1
              if: always()
              with:
                  name: Pytest Results
                  path: reports/junit.xml
                  reporter: java-junit

            - name: Comment PR with report link (on failure)
              if: steps.pytest.outcome == 'failure'
              uses: actions/github-script@v7
              with:
                  script: |
                      const runId = context.runId;
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;

                      const artifactUrl = `https://github.com/${owner}/${repo}/actions/runs/${runId}`;

                      github.rest.issues.createComment({
                        issue_number: context.issue.number,
                        owner,
                        repo,
                        body: |
                        `**Tests failed**
                          Download full HTML report:
                          ${artifactUrl}

                          Artifact name: \`test-reports\``
                                      });

            - name: Fail job if tests failed
              if: steps.pytest.outcome == 'failure'
              run: exit 1
