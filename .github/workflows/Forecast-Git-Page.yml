name: Build and Deploy Forecast

on:
    workflow_dispatch:
        inputs:
            latitude:
                description: "Latitude"
                required: false
            longitude:
                description: "Longitude"
                required: false
            limit:
                description: "Limit {1-7}"
                required: false
                default: "1"
            output_dir:
                description: "Output directory"
                required: false
                default: "output"

jobs:
    build:
        runs-on: ubuntu-latest

        permissions:
            contents: read
            pages: write
            id-token: write

        env:
            LATITUDE: ${{ github.event.inputs.latitude }}
            LONGITUDE: ${{ github.event.inputs.longitude }}
            LIMIT: ${{ github.event.inputs.limit }}
            OUTPUT_DIR: ${{ github.event.inputs.output_dir }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Install project
              run: |
                  python -m pip install --upgrade pip
                  pip install .

            - name: Run bash script
              run: |
                  chmod +x ./scripts/github/create-forecast-report.sh
                  ./scripts/github/create-forecast-report.sh

            - name: Upload Pages artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: ${{ env.OUTPUT_DIR }}

    deploy:
        needs: build
        runs-on: ubuntu-latest

        permissions:
            pages: write
            id-token: write

        steps:
            - name: Deploy
              uses: actions/deploy-pages@v4
