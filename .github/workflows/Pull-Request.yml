name: Pull Request

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  actions: read
  checks: write

# x-job-defaults: &job-defaults
#   runs-on: ubuntu-latest

defaults:
  run:
    working-directory: SunCastPy

env:
  REPORTS_DIR: ${{ github.workspace }}/SunCastPy/reports
  SCRIPTS_DIR: ${{ github.workspace }}/scripts

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          bash ${SCRIPTS_DIR}/github/install-project.sh [tests]
  pytest:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Run tests + generate reports
        id: pytest
        run: |
          mkdir -p $REPORTS_DIR
          pytest 
        continue-on-error: true
      - name: Publish test summary to PR
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Pytest Results
          path: ${{ env.REPORTS_DIR }}/junit.xml
          reporter: java-junit
      - name: Fail job if tests failed
        if: steps.pytest.outcome == 'failure'
        run: exit 1
  coverage:
    runs-on: ubuntu-latest
    needs: pytest
    steps:
      - name: Run coverage check
        uses: karilys-dev/python-coverage-check-action@v11
        if: always()
        with:
          working-directory: SunCastPy

  post:
    runs-on: ubuntu-latest
    needs: coverage
    steps:
      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: ${{ env.REPORTS_DIR }}/
          retention-days: 3
